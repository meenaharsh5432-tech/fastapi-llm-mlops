name: CI

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn httpx pytest pytest-asyncio pydantic python-dotenv prometheus-client requests

      - name: Run tests
        env:
          GROQ_API_KEY: dummy_key_for_tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t fastapi-llm:ci .

      - name: CI passed
        run: echo "CI passed"
